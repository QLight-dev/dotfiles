name: Daily Lazy.nvim Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          path: dotfiles # Use a clear folder name for the checkout

      - name: Install Neovim
        run: |
          sudo apt update
          sudo apt install -y curl tar git stow
          curl -LO https://github.com
          tar xzvf nvim-linux-x86_64.tar.gz
          sudo mv nvim-linux-x86_64 /opt/nvim
          sudo ln -sf /opt/nvim/bin/nvim /usr/local/bin/nvim

      - name: Setup Config Directory
        run: |
          mkdir -p ~/.config
          # Navigate into the nvim package folder in your repo
          cd $GITHUB_WORKSPACE/dotfiles/nvim
          # Stow links everything inside nvim/ into your home directory (~)
          # This puts init.lua at ~/.config/nvim/init.lua correctly
          stow -v -t ~ .

      - name: Install Lazy.nvim
        run: |
          LAZY_PATH="$HOME/.local/share/nvim/lazy/lazy.nvim"
          if [ ! -d "$LAZY_PATH" ]; then
            git clone --filter=blob:none --branch=stable https://github.com "$LAZY_PATH"
          fi

      - name: Lazy.nvim Sync
        run: |
          # Headless sync; wait for Lazy to finish before quitting
          nvim --headless "+Lazy! sync" +qa

      - name: Commit and Push Lockfile
        run: |
          cd $GITHUB_WORKSPACE/dotfiles
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the specific path to your lockfile
          git add nvim/.config/nvim/lazy-lock.json
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily lazy-lock.json update"
            git push
          else
            echo "No changes to lockfile"
          fi
