name: Daily Lazy.nvim Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          path: dotfiles

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y curl tar git stow
          curl -L -o nvim.tar.gz https://github.com
          tar xzvf nvim.tar.gz
          sudo mv nvim-linux-x86_64 /opt/nvim
          sudo ln -sf /opt/nvim/bin/nvim /usr/local/bin/nvim

      - name: Setup Config (Stow)
        run: |
          rm -rf ~/.config/nvim
          mkdir -p ~/.config
          cd $GITHUB_WORKSPACE/dotfiles/nvim
          stow -v -t ~ .
          echo "--- DEBUG: Config Directory Structure ---"
          ls -R ~/.config/nvim

      - name: Install Lazy.nvim (Your Requested Command)
        run: |
          # Ensuring directory exists before cloning
          mkdir -p ~/.config/nvim/lazy.nvim
          git clone --filter=blob:none https://github.com/folke/lazy.nvim.git ~/.config/nvim/lazy.nvim
          echo "--- DEBUG: Lazy path check ---"
          ls -d ~/.config/nvim/lazy.nvim

      - name: Lazy.nvim Sync with Debug Logs
        run: |
          # Use --headless and ! for waiting. 
          # Environment variable NVIM_LOG_FILE helps catch startup errors.
          export NVIM_LOG_FILE=$GITHUB_WORKSPACE/nvim_debug.log
          nvim --headless "+Lazy! sync" +qa || (cat $NVIM_LOG_FILE && exit 1)
          echo "--- DEBUG: Sync Complete ---"

      - name: Commit and Push
        run: |
          cd $GITHUB_WORKSPACE/dotfiles
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add nvim/.config/nvim/lazy-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily lazy-lock.json update"
            git push
          else
            echo "No changes detected in lockfile."
          fi
