name: Daily Lazy.nvim Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repo
      - name: Checkout Repo
        uses: actions/checkout@v3

      # Step 2: Install Neovim stable tarball
      - name: Install Neovim
        run: |
          sudo apt update
          sudo apt install -y curl tar git
          curl -LO https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
          tar xzvf nvim-linux-x86_64.tar.gz
          sudo mv nvim-linux-x86_64 /opt/nvim
          sudo ln -sf /opt/nvim/bin/nvim /usr/local/bin/nvim
          nvim --version

      # Step 3: Setup stow for your config
      - name: Setup stow
        run: |
          sudo apt install -y stow
          mkdir -p $HOME/.config
          cd $GITHUB_WORKSPACE
          stow nvim

      # Step 4: Install Lazy.nvim manually
      - name: Install Lazy.nvim
        run: |
          LAZY_PATH="$HOME/.local/share/nvim/lazy/lazy.nvim"
          if [ ! -d "$LAZY_PATH" ]; then
            git clone --filter=blob:none --branch=stable https://github.com/folke/lazy.nvim.git "$LAZY_PATH"
          fi

      # Step 5: Run Lazy.nvim sync headlessly
      - name: Lazy.nvim Sync
        run: |
          nvim --headless -u $HOME/.config/nvim/init.lua -c 'Lazy sync' -c 'qa'

      # Step 6: Commit updated lockfile if changed
      - name: Commit Updated Lockfile
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd $GITHUB_WORKSPACE/nvim/.config/nvim
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add lazy-lock.json
          git diff --cached --quiet || git commit -m "Daily Lazy.nvim auto-sync"
          git push https://$GH_PAT@github.com/QLight-dev/dotfiles.git main
