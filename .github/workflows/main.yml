name: Daily Lazy.nvim Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          path: nvim # Checkout into a specific folder

      - name: Install Neovim
        run: |
          curl -LO https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
          tar xzvf nvim-linux-x86_64.tar.gz
          sudo mv nvim-linux-x86_64 /opt/nvim
          sudo ln -sf /opt/nvim/bin/nvim /usr/local/bin/nvim

      - name: Setup Config Directory
        run: |
          mkdir -p ~/.config
          cd $GITHUB_WORKSPACE/nvim
          stow nvim

      - name: Install Lazy.nvim
        run: |
          LAZY_PATH="$HOME/.local/share/nvim/lazy/lazy.nvim"
          if [ ! -d "$LAZY_PATH" ]; then
            git clone --filter=blob:none --branch=stable https://github.com/folke/lazy.nvim.git "$LAZY_PATH"
          fi

      - name: Lazy.nvim Sync
        run: |
          nvim --headless "+Lazy! sync" +qa

      - name: Commit and Push Lockfile
        run: |
          cd nvim
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lazy-lock.json
          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily lazy-lock.json update"
            git push
          else
            echo "No changes to lockfile"
          fi
