name: Daily Lazy.nvim Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Neovim & Stow
        run: |
          sudo apt update && sudo apt install -y curl tar git stow
          # Using the specific 64-bit linux release URL
          curl -L -o nvim-linux64.tar.gz https://github.com
          sudo rm -rf /opt/nvim-linux64
          sudo tar -C /opt -xzf nvim-linux64.tar.gz
          sudo ln -sf /opt/nvim-linux64/bin/nvim /usr/local/bin/nvim

      - name: Setup Config with Stow
        run: |
          mkdir -p ~/.config
          # Links 'nvim/.config/nvim' to '$HOME/.config/nvim'
          stow nvim -t $HOME
          
          # Verify files exist
          ls -R ~/.config/nvim

      - name: Lazy.nvim Sync
        run: |
          export XDG_CONFIG_HOME=$HOME/.config
          # Headless sync
          nvim --headless "+Lazy! sync" +qa

      - name: Commit and Push Lockfile
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use the path within your repository
          git add nvim/.config/nvim/lazy-lock.json
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily lazy-lock.json update"
            git push
          else
            echo "No changes to lockfile."
          fi
