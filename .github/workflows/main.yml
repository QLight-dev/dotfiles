name: Daily Lazy.nvim Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          path: dotfiles

      - name: Install Neovim and Stow
        run: |
          sudo apt update
          sudo apt install -y curl tar git stow
          # Using the explicit stable release URL to avoid 'not in gzip format' errors
          curl -LO https://github.com
          tar xzvf nvim-linux-x86_64.tar.gz
          sudo mv nvim-linux-x86_64 /opt/nvim
          sudo ln -sf /opt/nvim/bin/nvim /usr/local/bin/nvim

      - name: Setup Config (Stow)
        run: |
          rm -rf ~/.config/nvim
          mkdir -p ~/.config
          cd $GITHUB_WORKSPACE/dotfiles/nvim
          # Maps dotfiles/nvim/.config/nvim/ to ~/.config/nvim/
          stow -v -t ~ .
          echo "--- DEBUG: Config Directory Structure ---"
          ls -R ~/.config/nvim

      - name: Install Lazy.nvim
        run: |
          # Ensure directory exists and clone lazy.nvim
          mkdir -p ~/.config/nvim/lazy.nvim
          git clone --filter=blob:none https://github.com ~/.config/nvim/lazy.nvim

      - name: Lazy.nvim Sync
        run: |
          # NVIM_LOG_FILE helps debug if sync hangs
          export NVIM_LOG_FILE=$GITHUB_WORKSPACE/nvim_debug.log
          nvim --headless "+Lazy! sync" +qa || (cat $NVIM_LOG_FILE && exit 1)

      - name: Commit and Push Lockfile
        run: |
          cd $GITHUB_WORKSPACE/dotfiles
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the lockfile specifically
          git add nvim/.config/nvim/lazy-lock.json
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily lazy-lock.json update"
            git push
          else
            echo "No changes to lockfile"
          fi
