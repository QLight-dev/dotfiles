name: Daily Lazy.nvim Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          path: dotfiles

      - name: Install Neovim and Stow
        run: |
          sudo apt update
          sudo apt install -y curl tar git stow
          # Using -o to explicitly name the output file avoids curl error 23
          curl -L -o nvim-linux-x86_64.tar.gz https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
          tar xzvf nvim-linux-x86_64.tar.gz
          sudo mv nvim-linux-x86_64 /opt/nvim
          sudo ln -sf /opt/nvim/bin/nvim /usr/local/bin/nvim

      - name: Setup Config Directory
        run: |
          mkdir -p ~/.config
          # Navigate to where your stow package 'nvim' lives
          cd $GITHUB_WORKSPACE/dotfiles/nvim
          # Stow links everything inside the nvim/ folder to your Home (~)
          # This puts init.lua at ~/.config/nvim/init.lua
          stow -v -t ~ .

      - name: Install Lazy.nvim
        run: |
          LAZY_PATH="$HOME/.local/share/nvim/lazy/lazy.nvim"
          if [ ! -d "$LAZY_PATH" ]; then
            git clone --filter=blob:none --branch=stable https://github.com "$LAZY_PATH"
          fi

      - name: Lazy.nvim Sync
        run: |
          # The ! forces sync to run non-interactively
          nvim --headless "+Lazy! sync" +qa

      - name: Commit and Push Lockfile
        run: |
          cd $GITHUB_WORKSPACE/dotfiles
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add specifically from your repo structure
          git add nvim/.config/nvim/lazy-lock.json
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily lazy-lock.json update"
            git push
          else
            echo "No changes to lockfile"
          fi
