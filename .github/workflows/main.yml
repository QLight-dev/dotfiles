name: Daily Lazy.nvim Sync

on:
  schedule:                  # daily at 4am UTC
    - cron: '0 4 * * *'
  workflow_dispatch:         # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout config into $HOME/.config/nvim
        uses: actions/checkout@v3
        with:
          path: ${{ github.workspace }}/.config/nvim

      - name: Setup Neovim (nightly)
        uses: MunifTanjim/setup-neovim-action@v1
        with:
          tag: nightly

      - name: Update plugins with Lazy.nvim
        run: |
          nvim --headless "+Lazy! sync" +qa
          # Optionally, check config health to catch errors:
          nvim --headless "+checkhealth" +qa || true

      - name: Commit any changes
        run: |
          cd $HOME/.config/nvim
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Daily Lazy.nvim sync"
          git push
