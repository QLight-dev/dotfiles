name: Daily Lazy.nvim Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Neovim & Stow
        run: |
          sudo apt update && sudo apt install -y curl tar git stow
          # Using -L to follow redirects and -o to specify the output file
          curl -L -o nvim.tar.gz https://github.com
          sudo tar -C /opt -xzf nvim.tar.gz
          sudo ln -sf /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim

      - name: Setup Config with Stow
        run: |
          mkdir -p ~/.config
          # This links 'nvim/.config/nvim' from your repo to '~/.config/nvim'
          stow nvim -t $HOME
          
          # Debug: Verify the config is where it should be
          ls -R ~/.config/nvim

      - name: Lazy.nvim Sync
        run: |
          # Ensure Neovim finds your config
          export XDG_CONFIG_HOME=$HOME/.config
          # Run sync synchronously and quit
          nvim --headless "+Lazy! sync" +qa

      - name: Commit and Push Lockfile
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the specific file in your repo structure
          git add nvim/.config/nvim/lazy-lock.json
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily lazy-lock.json update"
            git push
          else
            echo "No changes to lockfile found."
          fi
