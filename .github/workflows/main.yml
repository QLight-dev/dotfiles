name: Daily Lazy.nvim Sync

# Run manually or on schedule (4am UTC)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repo
      - name: Checkout Repo
        uses: actions/checkout@v3

      # Step 2: Install Neovim (your working install step)
      - name: Install Neovim
        uses: MunifTanjim/setup-neovim-action@v1
      - name: Check Neovim Version
        run: |
          nvim --version

      # Step 3: Link stow folder into ~/.config/nvim
      - name: Setup stow
        run: |
          sudo apt update && sudo apt install -y stow
          mkdir -p $HOME/.config
          cd $GITHUB_WORKSPACE/nvim
          stow -t $HOME/.config nvim

      # Step 4: Run Lazy.nvim sync headlessly
      - name: Lazy.nvim Sync
        run: |
          nvim --headless -c 'Lazy! sync' -c 'qa'

      # Step 5: Commit updated lockfile if changed
      - name: Commit Updated Lockfile
        run: |
          cd $GITHUB_WORKSPACE/nvim/.config/nvim
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add lazy-lock.json
          git diff --cached --quiet || git commit -m "Daily Lazy.nvim auto-sync"
          git push origin main
