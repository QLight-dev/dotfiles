name: Daily Lazy.nvim Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          path: dotfiles

      - name: Install Neovim and Stow
        run: |
          sudo apt update
          sudo apt install -y curl tar git stow
          curl -L -o nvim-linux-x86_64.tar.gz https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
          tar xzvf nvim-linux-x86_64.tar.gz
          sudo mv nvim-linux-x86_64 /opt/nvim
          sudo ln -sf /opt/nvim/bin/nvim /usr/local/bin/nvim

      - name: Setup Config Directory
        run: |
          # Clean up default runner paths to prevent Stow conflicts
          rm -rf ~/.config/nvim
          mkdir -p ~/.config
          # Navigate to your stow package folder
          cd $GITHUB_WORKSPACE/dotfiles/nvim
          # Maps dotfiles/nvim/.config/nvim/ to ~/.config/nvim/
          stow -v -t ~ .

      - name: Install Lazy.nvim (Bootstrap)
        run: |
          LAZY_PATH="$HOME/.local/share/nvim/lazy/lazy.nvim"
          mkdir -p "$(dirname "$LAZY_PATH")"
          if [ ! -d "$LAZY_PATH" ]; then
            git clone --filter=blob:none --branch=stable https://github.com "$LAZY_PATH"
          fi

      - name: Lazy.nvim Sync
        run: |
          # Runs sync and waits for it to finish before quitting
          nvim --headless "+Lazy! sync" +qa

      - name: Commit and Push Lockfile
        run: |
          cd $GITHUB_WORKSPACE/dotfiles
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use the path relative to the repo root
          git add nvim/.config/nvim/lazy-lock.json
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily lazy-lock.json update"
            git push
          else
            echo "No changes to lockfile"
          fi
