name: Daily Neovim Update

on:
  schedule:
    - cron: '0 8 * * *' # runs daily at 8:00 UTC
  workflow_dispatch: # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your dotfiles repo
      - name: Checkout repo
        uses: actions/checkout@v4 # Updated to v4 for Node 20 support

      # 2. Build Docker container
      - name: Build Docker container
        run: docker build -t nvim-ci .

      # 3. Run container and capture updates
      - name: Run Neovim update
        id: nvim_sync
        run: |
          # Run the update and save output to a file
          docker run --rm \
            -v ${{ github.workspace }}:/root/dotfiles \
            nvim-ci bash -c "\
              cd /root/dotfiles && \
              stow nvim && \
              nvim --headless '+Lazy! sync' +qa \
            " > lazy_output.txt 2>&1 || true
          
          # 1. Filter for success lines
          # 2. Exclude markdown-preview.nvim because it always reports false-positive local changes
          # 3. Format into "Plugin: Commit Message"
          UPDATES=$(grep "HEAD is now at" lazy_output.txt | grep -v "markdown-preview.nvim" | sed 's/.*\[\([^]]*\)\].*at \([^ ]*\) \(.*\)/\1: \2 - \3/')
          
          if [ -z "$UPDATES" ]; then
            UPDATES="No plugins required updates today."
          fi
          
          # Store in GITHUB_OUTPUT (handling multi-line strings for Slack)
          echo "plugin_updates<<EOF" >> $GITHUB_OUTPUT
          echo "$UPDATES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 4. Commit & push changes if any
      - name: Commit updates
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci-bot@noreply.github.com"
          
          # We check if lazy-lock.json or other files changed
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "CI: update Neovim plugins"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # 5. Send the clean notification to Slack
      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_CICD_WEBHOOK_URL }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: "Neovim Update: ${{ job.status }}"
          SLACK_MESSAGE: |
            *Updated Plugins:*
            ```
            ${{ steps.nvim_sync.outputs.plugin_updates }}
            ```
            
            <https://github.com{{ github.repository }}/actions/runs/${{ github.run_id }}|View Build Logs>
          SLACK_FOOTER: "Repo: QLight/dotfiles"
