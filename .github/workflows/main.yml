name: Daily Lazy.nvim Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Neovim & Stow
        run: |
          sudo apt update && sudo apt install -y curl tar git stow
          curl -LO https://github.com
          sudo tar -C /opt -xzf nvim-linux-x86_64.tar.gz
          sudo ln -sf /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim

      - name: Setup Config with Stow
        run: |
          mkdir -p ~/.config
          # Your repo has nvim/.config/nvim/
          # Stowing the 'nvim' folder into $HOME will link it to ~/.config/nvim/
          stow nvim -t $HOME

      - name: Lazy.nvim Sync
        run: |
          # 1. Tell Neovim where the config is
          export XDG_CONFIG_HOME=$HOME/.config
          
          # 2. Run sync. 
          # We use 'script' to trick Neovim into thinking there is a TTY 
          # This helps with plugin managers that expect interactive sessions.
          nvim --headless "+Lazy! sync" +qa

      - name: Commit and Push Lockfile
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Explicitly add the lockfile using the path in your repo
          git add nvim/.config/nvim/lazy-lock.json
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily lazy-lock.json update"
            git push
          else
            echo "No changes to lockfile. Skipping."
          fi
