name: Daily Neovim Update

on:
  schedule:
    - cron: '0 8 * * *' # runs daily at 8:00 UTC
  workflow_dispatch: # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your dotfiles repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Build Docker container
      - name: Build Docker container
        run: docker build -t nvim-ci .

      # 3. Run container and capture updates
      - name: Run Neovim update
        id: nvim_sync
        run: |
          # Run the update and save output to a file
          docker run --rm \
            -v ${{ github.workspace }}:/root/dotfiles \
            nvim-ci bash -c "\
              cd /root/dotfiles && \
              stow nvim && \
              nvim --headless '+Lazy! sync' +qa \
            " > lazy_output.txt 2>&1 || true
          
          # Filter for success lines and format them
          UPDATES=$(grep "HEAD is now at" lazy_output.txt | grep -v "markdown-preview.nvim" | sed 's/.*\[\([^]]*\)\].*at \([^ ]*\) \(.*\)/\1: \2 - \3/')
          
          if [ -z "$UPDATES" ]; then
            UPDATES="No plugins required updates today."
          fi
          
          # Store in GITHUB_OUTPUT for the Slack step
          echo "plugin_updates<<EOF" >> $GITHUB_OUTPUT
          echo "$UPDATES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 4. Commit & push changes if any
      - name: Commit updates
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci-bot@noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "ci(daily neovim update): addd slack notifying (overkill but idc)"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # 5. Send the "Official-looking" GitHub Notification
      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_CICD_WEBHOOK_URL }}
          # Use GitHub brand colors: Green (#2ea44f) or Red (#cb2431)
          SLACK_COLOR: ${{ job.status == 'success' && '#2ea44f' || '#cb2431' }}
          # Gaslight mode: On
          SLACK_USERNAME: "GitHub"
          SLACK_ICON: "https://github.githubassets.com"
          SLACK_TITLE: "Workflow: Daily Neovim Update"
          SLACK_MESSAGE: |
            *Status:* ${{ job.status }}
            *Updated Plugins:*
            ```
            ${{ steps.nvim_sync.outputs.plugin_updates }}
            ```
            
            <https://github.com{{ github.repository }}/actions/runs/${{ github.run_id }}|View run details>
          SLACK_FOOTER: "via GitHub Actions in Repo QLight/dotfiles"
          MSG_MINIMAL: true
