name: Daily Lazy.nvim Sync

# Run every day at 4am UTC
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repo
      - name: Checkout Repo
        uses: actions/checkout@v3

      # Step 2: Sync config to home directory
      - name: Sync Neovim Config
        run: |
          mkdir -p $HOME/.config/nvim
          rsync -av --delete ./ $HOME/.config/nvim/

      # Step 3: Install Neovim nightly (for Lazy.nvim headless)
      - name: Install Neovim
        uses: shivammathur/setup-neovim@v2
        with:
          neovim-version: nightly

      # Step 4: Run Lazy.nvim sync headlessly
      - name: Lazy.nvim Sync
        run: |
          nvim --headless +Lazy! sync +qa

      # Step 5: Commit changes if any
      - name: Commit Updated Lockfiles
        run: |
          cd $HOME/.config/nvim
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Daily Lazy.nvim auto-sync"
          git push origin main
