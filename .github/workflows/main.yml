name: Daily Lazy.nvim Sync

# Run every day at 4am UTC
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Step 1: Checkout your repo
      - name: Checkout Repo
        uses: actions/checkout@v3

      # Step 2: Sync config to home directory
      - name: Sync Neovim Config
        run: |
          mkdir -p $HOME/.config/nvim
          rsync -av --delete ./ $HOME/.config/nvim/

      # Step 3: Install Neovim latest release if not already installed
      - name: Install Neovim
        run: |
          if ! command -v nvim >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y unzip curl
            NVIM_VER=$(curl -s https://api.github.com/repos/neovim/neovim/releases/latest \
                        | grep "tag_name" \
                        | head -n 1 \
                        | cut -d '"' -f 4)
            curl -LO https://github.com/neovim/neovim/releases/download/$NVIM_VER/nvim-linux64.tar.gz
            tar xzf nvim-linux64.tar.gz
            sudo mv nvim-linux64 /opt/nvim
            sudo ln -sf /opt/nvim/bin/nvim /usr/local/bin/nvim
          else
            echo "Neovim already installed, skipping..."
          fi

      # Step 4: Run Lazy.nvim sync headlessly
      - name: Lazy.nvim Sync
        run: |
          nvim --headless +Lazy! sync +qa

      # Step 5: Commit changes if any
      - name: Commit Updated Lockfiles
        run: |
          cd $HOME/.config/nvim
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Daily Lazy.nvim auto-sync"
          git push origin main
