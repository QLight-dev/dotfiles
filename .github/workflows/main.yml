name: Daily Lazy.nvim Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  lazy-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Neovim & Stow
        run: |
          sudo apt update && sudo apt install -y curl tar git stow
          # Use the official pre-built binary
          curl -LO https://github.com
          sudo tar -C /opt -xzf nvim-linux-x86_64.tar.gz
          sudo ln -sf /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim

      - name: Setup Config with Stow
        run: |
          mkdir -p ~/.config
          # This links your repo's 'nvim/.config/nvim' to '~/.config/nvim'
          # Stow works by looking inside the target folder (nvim) for the structure
          stow nvim -t $HOME

      - name: Lazy.nvim Sync
        run: |
          # Ensure Neovim knows where the stowed config is
          export XDG_CONFIG_HOME=$HOME/.config
          
          # 1. Start Neovim
          # 2. Run Lazy! sync (the '!' makes it run synchronously)
          # 3. +qa quits all once finished
          nvim --headless "+Lazy! sync" +qa

      - name: Commit and Push Lockfile
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the specific lockfile from your repo path
          git add nvim/.config/nvim/lazy-lock.json
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily lazy-lock.json update"
            git push
          else
            echo "No changes to lockfile found. Skipping push."
          fi
