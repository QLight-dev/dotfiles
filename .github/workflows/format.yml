name: Format Neovim Config in Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allow commits back to the repo
      id-token: write   # optional, if you ever need auth
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Build Docker container
        run: |
          docker build -t nvim-ci -f Dockerfile .

      - name: Run formatter inside Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            nvim-ci \
            bash -c "\
              stow -v -t \$HOME nvim && \
              stylua \$HOME/.config/nvim \
            "

      - name: Commit formatted changes
        run: |
          git config user.name "CI Bot"
          git config user.email "ci-bot@noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Auto-format Neovim config via CI"
          git push
